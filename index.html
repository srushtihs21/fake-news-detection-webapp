<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fake News Detector</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    width: 420px;
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    text-align: center;
    animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    margin-bottom: 10px;
}

.subtitle {
    font-size: 14px;
    color: gray;
    margin-bottom: 20px;
}

textarea {
    width: 100%;
    height: 140px;
    border-radius: 12px;
    border: 1px solid #ddd;
    padding: 12px;
    font-size: 14px;
    resize: none;
    outline: none;
    transition: 0.3s;
}

textarea:focus {
    border-color: #667eea;
}

button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background: #667eea;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5a67d8;
}

.result-box {
    margin-top: 20px;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
}

.real {
    background: #e6fffa;
    color: #047857;
}

.fake {
    background: #ffe4e6;
    color: #b91c1c;
}

.icon {
    font-size: 40px;
    color: #667eea;
    margin-bottom: 10px;
}

</style>
</head>

<body>

<div class="container">

    <div class="icon">
        <i class="fas fa-newspaper"></i>
    </div>

    <h1>Fake News Detector</h1>
    <div class="subtitle">Check if news is real or fake instantly</div>

    <form method="POST" onsubmit="showLoader()">
        <textarea name="news" placeholder="Paste news content here..."></textarea>
        <button type="submit">🔍 Analyze News</button>
    </form>

    <div id="loading" style="display:none; margin-top:15px;">
        ⏳ Analyzing...
    </div>

    {% if prediction %}
        <div class="result-box {{ 'real' if prediction == 'REAL' else 'fake' }}">
            {{ prediction }}
        </div>
    {% endif %}

</div>

<script>
function showLoader(){
    document.getElementById("loading").style.display = "block";
}
</script>

</body>
</html>
